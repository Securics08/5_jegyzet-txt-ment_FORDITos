<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Végtelen Jegyzet PRO - All Features Enabled</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Abel&family=Abril+Fatface&family=Acme&family=Alegreya&family=Alex+Brush&family=Alfa+Slab+One&family=Alice&family=Alumni+Sans+Inline+One&family=Amatic+SC&family=Amita&family=Antic+Didone&family=Anton&family=Architects+Daughter&family=Archivo+Black&family=Are+You+Serious&family=Arima+Madurai&family=Arvo&family=Asap&family=Asset&family=Atomic+Age&family=Audiowide&family=Bangers&family=Barlow+Condensed&family=Bebas+Neue&family=Berkshire+Swash&family=Bevan&family=Bigelow+Rules&family=Black+Ops+One&family=Bonbon&family=Boogaloo&family=Bowlby+One+SC&family=Bungee+Shade&family=Butcherman&family=Cabin+Sketch&family=Caesar+Dressing&family=Carter+One&family=Caveat&family=Cinzel+Decorative&family=Codystar&family=Comfortaa&family=Coming+Soon&family=Concert+One&family=Cookie&family=Courgette&family=Creepster&family=Dancing+Script&family=Diplomata+SC&family=Domine&family=Eater&family=EB+Garamond&family=Emblema+One&family=Ewert&family=Fascinate+Inline&family=Faster+One&family=Finger+Paint&family=Flavors&family=Fontdiner+Swanky&family=Fredericka+the+Great&family=Frijole&family=Fugaz+One&family=Glass+Antiqua&family=Gloria+Hallelujah&family=Gochi+Hand&family=Great+Vibes&family=Grenze+Gotisch&family=Griffy&family=Handlee&family=Henny+Penny&family=Iceberg&family=Indie+Flower&family=Irish+Grover&family=Italianno&family=Jolly+Lodger&family=Kaushan+Script&family=Kelly+Slab&family=Kranky&family=Kumar+One&family=Lobster&family=Londrina+Shadow&family=Luckiest+Guy&family=Macondo&family=MedievalSharp&family=Megrim&family=Metal+Mania&family=Modak&family=Monoton&family=Mountains+of+Christmas&family=Mystery+Quest&family=Nabla&family=Nosifer&family=Nothing+You+Could+Do&family=Orbitron&family=Pacifico&family=Parisienne&family=Permanent+Marker&family=Pinyon+Script&family=Playfair+Display&family=Press+Start+2P&family=Righteous&family=Rubik+Glitch&family=Sacramento&family=Satisfy&family=Shadows+Into+Light&family=Silkscreen&family=Special+Elite&family=Syncopate&family=Ultra&family=UnifrakturMaguntia&family=VT323&family=Wallpoet&family=Zeyada&family=Montserrat&family=Nunito&family=Oswald&family=Spectral&family=Varela+Round&family=Roboto+Serif&family=Roboto+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--panel:#141414;--text:#ddd;--border:#333;--accent:#00ff00;--val-color:#00ffff;}
.light{--bg:#f0f0f0;--panel:#e0e0e0;--text:#111;--border:#ccc;--accent:#008800;--val-color:#0000ff;}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial, sans-serif;overflow:hidden;}

.color-green { color: #55ff55 !important; }
.color-cyan { color: #55ffff !important; }
.color-red { color: #ff5555 !important; }

/* Feltűnő gombok */
.danger-reset { color: #ff0000 !important; border: 2px solid #ff0000 !important; font-weight: bold !important; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
.success-import { color: #00ff00 !important; border: 2px solid #00ff00 !important; font-weight: bold !important; box-shadow: 0 0 10px rgba(0,255,0,0.2); }

#topbar{display:flex;flex-wrap:wrap;gap:5px;padding:10px;background:var(--panel);border-bottom:1px solid var(--border);align-items:center;}
button,select,input{background:#000;color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:14px;display:inline-flex;align-items:center;gap:6px;}
#notes { font-weight: bold; width: 220px; }
textarea{width:100vw;height:calc(100vh - 160px);background:rgba(0,0,0,0.8);color:inherit;border:none;padding:20px;box-sizing:border-box;resize:none;line-height:1.5;font-size:25px;outline:none;}
#stats{position:fixed;bottom:10px;right:20px;font-family:'VT323';font-size:18px;color:var(--accent);pointer-events:none;}
.group{display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);padding-right:8px;margin-right:4px;}
</style>
</head>
<body>

<div id="topbar">
<div class="group">
    <select id="notes" onchange="switchNote()"></select>
    <button onclick="newNote()">+ Új</button>
</div>

<div class="group">
<select id="fontFamily" onchange="changeFont()"></select>
<input type="number" id="fontSize" value="25" min="8" max="150" style="width:60px" oninput="changeSize()">
<button onclick="toggleBold()" class="color-green"><b>B</b></button>
<button onclick="toggleItalic()" class="color-cyan"><i>I</i></button>
<button onclick="toggleUnderline()" class="color-red"><u>U</u></button>
</div>

<div class="group">
    <input type="color" id="textColor" value="#eeeeee" oninput="updateStyles()">
    <input type="color" id="bgColor" value="#000000" oninput="updateStyles()">
    <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.7" style="width:60px" oninput="updateStyles()">
</div>

<div class="group">
    <select id="transDir">
        <option value="hu|en">Magyar ➡ Angol</option>
        <option value="en|hu">Angol ➡ Magyar</option>
    </select>
    <button onclick="translateText()" class="color-green">🌐 Fordítás</button>
</div>

<div class="group">
    <button onclick="speakText()" class="color-cyan">🔊 Hallgat</button>
    <button onclick="stopSpeak()" class="color-red">🟥 Stop</button>
</div>

<div class="group">
    <button onclick="exportJSON()" class="random-save">✉️ Küldés</button>
    <button onclick="toggleDark()">🌗 Mód</button>
    <button onclick="undo()">⬅️ Vissza</button>
    <button onclick="redo()" class="color-cyan">➡️ Előre</button>
</div>

<div class="group">
    <button onclick="importFiles()" class="success-import">📁 Import</button>
    <button onclick="downloadPDF()" class="random-save">📄 PDF</button>
    <button onclick="downloadTxt()" class="random-save">⬇️ TXT</button>
    <button onclick="downloadAllZip()" class="random-save">📦 ZIP</button>
</div>

<div class="group">
    <button onclick="deleteCurrent()" class="color-red">🗑️ Töröl</button>
    <button onclick="resetApp()" class="danger-reset">⚠️ RESET</button>
</div>

<input id="search" placeholder="Keresés..." oninput="searchText()">
</div>

<textarea id="editor" placeholder="Írj ide..."></textarea>
<div id="stats">Szavak: <span id="wCount">0</span> | Karakterek: <span id="cCount">0</span></div>

<script>
const rawFonts = ["Arial","Abel","Abril Fatface","Acme","Alegreya","Alex Brush","Alfa Slab One","Alice","Alumni Sans Inline One","Amatic SC","Amita","Antic Didone","Anton","Architects Daughter","Archivo Black","Are You Serious","Arima Madurai","Arvo","Asap","Asset","Atomic Age","Audiowide","Bangers","Barlow Condensed","Bebas Neue","Berkshire Swash","Bevan","Bigelow Rules","Black Ops One","Bonbon","Boogaloo","Bowlby One SC","Bungee Shade","Butcherman","Cabin Sketch","Caesar Dressing","Carter One","Caveat","Cinzel Decorative","Codystar","Comfortaa","Coming Soon","Concert One","Cookie","Courgette","Creepster","Dancing Script","Diplomata SC","Domine","Eater","EB Garamond","Emblema One","Ewert","Fascinate Inline","Faster One","Finger Paint","Flavors","Fontdiner Swanky","Fredericka the Great","Frijole","Fugaz One","Glass Antiqua","Gloria Hallelujah","Gochi Hand","Great Vibes","Grenze Gotisch","Griffy","Handlee","Henny Penny","Iceberg","Indie Flower","Irish Grover","Italianno","Jolly Lodger","Kaushan Script","Kelly Slab","Kranky","Kumar One","Lobster","Londrina Shadow","Luckiest Guy","Macondo","MedievalSharp","Megrim","Metal Mania","Modak","Monoton","Mountains of Christmas","Mystery Quest","Nabla","Nosifer","Nothing You Could Do","Orbitron","Pacifico","Parisienne","Permanent Marker","Pinyon Script","Playfair Display","Press Start 2P","Righteous","Rubik Glitch","Sacramento","Satisfy","Shadows Into Light","Silkscreen","Special Elite","Syncopate","Ultra","UnifrakturMaguntia","VT323","Wallpoet","Zeyada","Montserrat","Nunito","Oswald","Spectral","Varela Round","Roboto Serif","Roboto Mono"];
const fontColors = ["#ff5555", "#55ff55", "#5555ff", "#ffff55", "#ff55ff", "#55ffff", "#ffaa00", "#ff00aa", "#aa00ff", "#00ffaa"];

let notes = JSON.parse(localStorage.getItem("MY_NOTES_NEW")) || {"Üdvözlő!!!": ""};
let current = Object.keys(notes)[0];
const editor = document.getElementById("editor");
const select = document.getElementById("notes");

function setRandomSaveColors() {
    document.querySelectorAll('.random-save').forEach(btn => {
        btn.style.color = fontColors[Math.floor(Math.random() * fontColors.length)];
    });
}

function refresh() {
    select.innerHTML = "";
    Object.keys(notes).forEach((n, i) => {
        let o = document.createElement("option"); o.value = n; o.textContent = n;
        o.style.color = (n === "Üdvözlő!!!") ? "#55ff55" : fontColors[i % fontColors.length];
        select.appendChild(o);
    });
    select.value = current;
    select.style.color = select.options[select.selectedIndex].style.color;
    editor.value = notes[current] || "";
    updateStats();
    setRandomSaveColors();
}

function switchNote() { 
    current = select.value; refresh(); 
}

editor.addEventListener("input", () => {
    notes[current] = editor.value; updateStats(); localStorage.setItem("MY_NOTES_NEW", JSON.stringify(notes));
});

// IMPORT (TXT, ZIP, ALL)
async function importFiles() {
    const input = document.createElement('input'); input.type = 'file'; input.multiple = true;
    input.onchange = async e => {
        for (const file of Array.from(e.target.files)) {
            if (file.name.endsWith('.zip')) {
                const zip = await JSZip.loadAsync(file);
                for (const filename of Object.keys(zip.files)) { if (!zip.files[filename].dir) notes[filename] = await zip.files[filename].async("string"); }
            } else { notes[file.name] = await file.text(); }
            current = file.name;
        }
        localStorage.setItem("MY_NOTES_NEW", JSON.stringify(notes)); refresh();
    };
    input.click();
}

// FORDÍTÓ
async function translateText() {
    const dir = document.getElementById("transDir").value.split('|');
    if (!editor.value.trim()) return;
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${dir[0]}&tl=${dir[1]}&dt=t&q=${encodeURIComponent(editor.value)}`);
        const data = await res.json();
        let translated = ""; data[0].forEach(item => { if(item[0]) translated += item[0]; });
        editor.value = translated; notes[current] = editor.value; updateStats();
    } catch (e) { alert("Hiba!"); }
}

// HANG
function speakText(){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(editor.value); m.lang='hu-HU'; window.speechSynthesis.speak(m); }
function stopSpeak(){ window.speechSynthesis.cancel(); }

// EXPORT JSON (Küldés)
function exportJSON(){
    const blob = new Blob([JSON.stringify(notes)], {type: "application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "mentes.json"; a.click();
}

const fontDropdown = document.getElementById('fontFamily');
rawFonts.sort().forEach((f, index) => {
    let o = document.createElement('option'); o.value = f; o.textContent = `${index + 1}. ${f}`; o.style.fontFamily = f; o.style.color = fontColors[index % fontColors.length];
    fontDropdown.appendChild(o);
});

function changeFont() { editor.style.fontFamily = fontDropdown.value; }
function changeSize() { editor.style.fontSize = document.getElementById("fontSize").value + "px"; }
function toggleBold() { editor.style.fontWeight = editor.style.fontWeight === 'bold' ? 'normal' : 'bold'; }
function toggleItalic() { editor.style.fontStyle = editor.style.fontStyle === 'italic' ? 'normal' : 'italic'; }
function toggleUnderline() { editor.style.textDecoration = editor.style.textDecoration === 'underline' ? 'none' : 'underline'; }
function toggleDark() { document.body.classList.toggle("light"); }
function undo() { document.execCommand('undo'); }
function redo() { document.execCommand('redo'); }

function updateStyles() {
    editor.style.color = document.getElementById("textColor").value;
    const hex = document.getElementById("bgColor").value;
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    editor.style.backgroundColor = `rgba(${r},${g},${b}, ${document.getElementById("opacity").value})`;
}

function downloadTxt() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([editor.value], {type: "text/plain"})); a.download = current + ".txt"; a.click(); }
function downloadAllZip() {
    const zip = new JSZip(); Object.keys(notes).forEach(n => zip.file(n + ".txt", notes[n]));
    zip.generateAsync({type: "blob"}).then(c => { const a = document.createElement("a"); a.href = URL.createObjectURL(c); a.download = "Jegyzetek.zip"; a.click(); });
}
function downloadPDF() { const doc = new jspdf.jsPDF(); doc.text(editor.value, 10, 10); doc.save(current + ".pdf"); }
function newNote() { let n = prompt("Név:"); if (n) { notes[n] = ""; current = n; refresh(); } }
function deleteCurrent() { if (confirm("Törlöd?")) { delete notes[current]; current = Object.keys(notes)[0] || "Üdvözlő!!!"; if(!notes[current]) notes["Üdvözlő!!!"]=""; refresh(); } }
function resetApp() { if (confirm("Mindent törölsz?")) { localStorage.clear(); location.reload(); } }
function updateStats() { document.getElementById("wCount").innerText = editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0; document.getElementById("cCount").innerText = editor.value.length; }

function searchText(){
    let q=document.getElementById("search").value.toLowerCase(); if(!q) return;
    let pos=editor.value.toLowerCase().indexOf(q); if(pos!==-1){editor.focus(); editor.setSelectionRange(pos,pos+q.length);}
}

refresh();
updateStyles();
editor.value = ""; // Betöltéskor üres ablak
</script>
</body>
</html>
